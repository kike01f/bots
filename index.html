<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ARTURITO AI — Plataforma SaaS para Condominios</title>
<meta name="description" content="Chatbot inteligente, tickets, portal de residentes y panel administrativo">
<meta name="theme-color" content="#7FBA02">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js" defer></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js" defer></script>
<style>
:root {
  --font-sans:'Nunito',system-ui,sans-serif;
  --arturito-green:#7FBA02;--arturito-green-light:#8FCB1A;--arturito-green-dark:#5a8501;
  --primary:#7FBA02;--primary-dark:#5a8501;--secondary:#6366f1;--accent:#f59e0b;
  --bg:#f0f4f8;--bg-card:rgba(255,255,255,.78);--bg-sidebar:rgba(15,23,42,.96);
  --text:#1e293b;--text-muted:#64748b;--border:rgba(148,163,184,.28);
  --shadow:0 8px 32px rgba(15,23,42,.08);--radius:16px;--radius-sm:10px;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6;
  --sidebar-w:260px;--transition:.25s cubic-bezier(.4,0,.2,1);
  --chat-user:#dcf8c6;--chat-bot:#fff;
}
[data-theme="dark"] {
  --bg:#0f172a;--bg-card:rgba(30,41,59,.82);--bg-sidebar:rgba(2,6,23,.98);
  --text:#f1f5f9;--text-muted:#94a3b8;--border:rgba(71,85,105,.45);
  --chat-user:#065f46;--chat-bot:#1e293b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth;font-family:var(--font-sans)}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background var(--transition),color var(--transition)}
button,input,select,textarea,.btn{font-family:inherit}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,color-mix(in srgb,var(--primary) 16%,transparent),transparent 50%),radial-gradient(ellipse at 80% 80%,color-mix(in srgb,var(--secondary) 12%,transparent),transparent 50%);pointer-events:none;z-index:0}
body.mode-resident{background:#0f172a}body.mode-resident::before{display:none}
#app{display:flex;min-height:100vh;position:relative;z-index:1}
.hidden{display:none!important}
.skeleton{background:linear-gradient(90deg,color-mix(in srgb,var(--border) 40%,transparent) 25%,color-mix(in srgb,var(--border) 70%,transparent) 50%,color-mix(in srgb,var(--border) 40%,transparent) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;min-height:1rem}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
@keyframes fabFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes arturitoBlinkSoft{0%,92%,100%{opacity:1}96%{opacity:.15}}
@keyframes arturitoWaveSoft{0%,100%{transform:rotate(0deg)}25%{transform:rotate(12deg)}75%{transform:rotate(-8deg)}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}

/* Auth */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;z-index:2}
.auth-card{width:100%;max-width:420px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;box-shadow:var(--shadow)}
.auth-logo{width:72px;height:72px;margin:0 auto 1rem;filter:drop-shadow(0 6px 16px rgba(127,186,2,.35))}
.auth-card h1{text-align:center;font-size:1.35rem;margin-bottom:.25rem}
.auth-card p.sub{text-align:center;color:var(--text-muted);font-size:.85rem;margin-bottom:1.25rem}
.auth-tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.auth-tabs button{flex:1;padding:.55rem;border:1px solid var(--border);background:transparent;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-muted);font-weight:600}
.auth-tabs button.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform var(--transition)}
.sidebar-header{padding:1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem}
.sidebar-logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--arturito-green-dark));display:flex;align-items:center;justify-content:center;overflow:hidden}
.sidebar-brand h1{font-size:1rem;color:#fff;font-weight:700}
.sidebar-brand span{font-size:.7rem;color:#94a3b8}
.nav{flex:1;padding:.75rem;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:.65rem;padding:.7rem .85rem;border-radius:var(--radius-sm);color:#cbd5e1;cursor:pointer;transition:all var(--transition);margin-bottom:.25rem;font-size:.875rem;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:linear-gradient(135deg,color-mix(in srgb,var(--primary) 85%,transparent),color-mix(in srgb,var(--secondary) 55%,transparent));color:#fff}
.nav-item .icon{width:22px;text-align:center}
.sidebar-footer{padding:1rem;border-top:1px solid var(--border);display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.theme-toggle,.sidebar-toggle{background:rgba(255,255,255,.1);border:1px solid var(--border);color:#cbd5e1;border-radius:8px;padding:.45rem .65rem;cursor:pointer;font-size:.85rem}

/* Main */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;width:calc(100% - var(--sidebar-w))}
.topbar{padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg-card);position:sticky;top:0;z-index:50}
.topbar h2{font-size:1.15rem;font-weight:600}
.content{padding:1.25rem 1.5rem;flex:1}
.view{display:none;animation:fadeIn .3s ease}.view.active{display:block}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.25rem;margin-bottom:1rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.card-title{font-size:1rem;font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.25rem}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.stat-card.green::after{background:var(--primary)}.stat-card.blue::after{background:var(--info)}
.stat-card.amber::after{background:var(--warning)}.stat-card.red::after{background:var(--danger)}
.stat-value{font-size:1.75rem;font-weight:700}.stat-label{font-size:.78rem;color:var(--text-muted);margin-top:.35rem}

/* Buttons & forms */
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.55rem 1rem;border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;cursor:pointer;border:none;transition:all var(--transition)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff}
.btn-primary:hover{filter:brightness(1.08)}
.btn-secondary{background:var(--bg-card);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:.35rem .7rem;font-size:.78rem}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem}
.form-group{display:flex;flex-direction:column;gap:.35rem}
.form-group.full{grid-column:1/-1}
label{font-size:.8rem;font-weight:500;color:var(--text-muted)}
input,select,textarea{padding:.6rem .85rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text);font-size:.875rem}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 20%,transparent)}
textarea{resize:vertical;min-height:80px}
.toolbar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.search-box{flex:1;min-width:180px;max-width:320px}

/* Tables */
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:.65rem .85rem;text-align:left;border-bottom:1px solid var(--border)}
th{background:color-mix(in srgb,var(--primary) 8%,transparent);font-weight:600;font-size:.78rem;text-transform:uppercase;color:var(--text-muted);cursor:pointer}
tr:hover td{background:color-mix(in srgb,var(--primary) 4%,transparent)}
.badge{display:inline-block;padding:.2rem .55rem;border-radius:20px;font-size:.72rem;font-weight:600;text-transform:uppercase}
.badge-open{background:#dbeafe;color:#1d4ed8}.badge-assigned{background:#e0e7ff;color:#4338ca}
.badge-process{background:#fce7f3;color:#be185d}.badge-pending{background:#fef3c7;color:#b45309}
.badge-resolved{background:#d1fae5;color:#047857}.badge-closed{background:#f1f5f9;color:#475569}
.badge-low{background:#ecfdf5;color:#059669}.badge-medium{background:#fef9c3;color:#ca8a04}
.badge-high{background:#fee2e2;color:#dc2626}.badge-critical{background:#450a0a;color:#fff}

/* Modal & toast */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:6000;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-muted)}
.toast-container{position:fixed;top:1rem;right:1rem;z-index:6500;display:flex;flex-direction:column;gap:.5rem}
.toast{padding:.75rem 1.1rem;border-radius:var(--radius-sm);background:var(--bg-sidebar);color:#fff;font-size:.85rem;animation:slideIn .3s ease;max-width:340px}
.toast.success{border-left:4px solid var(--success)}.toast.error{border-left:4px solid var(--danger)}.toast.info{border-left:4px solid var(--info)}

/* Charts */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem}
.chart-card canvas{width:100%!important;height:220px!important}

/* Docs */
.docs-section{line-height:1.6;font-size:.9rem}
.docs-section h3{margin:1rem 0 .5rem;color:var(--primary)}
.docs-section ol,.docs-section ul{margin-left:1.25rem;margin-bottom:.75rem}
.docs-section code{background:color-mix(in srgb,var(--primary) 10%,transparent);padding:.15rem .4rem;border-radius:4px;font-size:.82rem}
.docs-block{background:color-mix(in srgb,var(--border) 30%,transparent);border-radius:var(--radius-sm);padding:1rem;margin:.75rem 0;font-family:monospace;font-size:.78rem;overflow-x:auto;white-space:pre-wrap}

/* Resident portal */
.resident-portal{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;color:#e2e8f0}
.resident-portal .mascot{width:132px;height:132px;margin-bottom:1rem;filter:drop-shadow(0 8px 20px rgba(0,0,0,.35))}
.resident-portal h1{font-size:1.75rem;margin-bottom:.5rem}
.resident-portal .tagline{color:#94a3b8;margin-bottom:1.5rem}

/* Chat widget Intercom style */
.chat-dock{position:fixed;z-index:5000;right:max(1rem,env(safe-area-inset-right));bottom:max(1rem,env(safe-area-inset-bottom))}
.chat-fab{width:68px;height:68px;border-radius:50%;border:2px solid rgba(255,255,255,.75);background:linear-gradient(145deg,#eceef2,#d1d5db);cursor:pointer;box-shadow:0 8px 28px rgba(15,23,42,.22);padding:7px;transition:transform .35s,opacity .35s}
.chat-fab:hover{transform:scale(1.06) translateY(-3px)}
.chat-fab svg{width:100%;height:100%}
.chat-fab .blinking-eyes{animation:arturitoBlinkSoft 5s ease-in-out infinite}
.chat-fab .waving-hand{animation:arturitoWaveSoft 4s ease-in-out infinite}
.chat-panel{display:none;width:min(400px,calc(100vw - 2rem));height:min(580px,calc(100vh - 6rem));background:#fff;border-radius:16px;box-shadow:0 12px 48px rgba(0,0,0,.2);flex-direction:column;overflow:hidden;margin-bottom:.75rem}
.chat-dock.open .chat-panel{display:flex;animation:fadeIn .25s ease}
.chat-dock.open .chat-fab{opacity:0;pointer-events:none;transform:scale(.5)}
.chat-header{background:linear-gradient(135deg,#7FBA02,#5a8501);color:#fff;padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem}
.chat-header-avatar{width:44px;height:44px;background:rgba(255,255,255,.2);border-radius:50%;padding:4px}
.chat-header-avatar svg{width:100%;height:100%}
.chat-header-info h3{font-size:.95rem;font-weight:700}
.chat-header-info span{font-size:.72rem;opacity:.9}
.chat-close{margin-left:auto;background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem}
.chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.65rem;background:#f8fafc}
.msg{max-width:85%;padding:.65rem .9rem;border-radius:12px;font-size:.875rem;line-height:1.45;animation:msgIn .25s ease}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#7FBA02,#6ba902);color:#fff;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:#fff;border:1px solid #e2e8f0;border-bottom-left-radius:4px}
.msg-time{font-size:.65rem;opacity:.7;margin-top:.25rem}
.msg-actions{margin-top:.4rem;display:flex;gap:.35rem;flex-wrap:wrap}
.msg-actions button{font-size:.72rem;padding:.2rem .5rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--primary);cursor:pointer}
.typing-indicator{display:none;align-self:flex-start;padding:.5rem .85rem;background:#fff;border-radius:12px;border:1px solid #e2e8f0;gap:4px}
.typing-indicator.show{display:flex}
.typing-indicator span{width:7px;height:7px;background:#7FBA02;border-radius:50%;animation:typing 1.2s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}.typing-indicator span:nth-child(3){animation-delay:.4s}
.chat-quick-bar{display:flex;gap:.35rem;padding:.5rem .75rem;overflow-x:auto;border-top:1px solid #e2e8f0;background:#fff}
.chat-quick-bar button{flex-shrink:0;padding:.3rem .65rem;border-radius:20px;font-size:.72rem;border:1px solid #e2e8f0;background:#f9fafb;color:#5a8501;cursor:pointer;font-weight:600}
.chat-input-area{padding:.75rem;border-top:1px solid #e2e8f0;background:#fff}
.chat-input-row{display:flex;gap:.5rem;align-items:flex-end}
.chat-input-row textarea{flex:1;min-height:42px;max-height:100px;border-radius:20px;padding:.6rem 1rem;border:1px solid #e2e8f0}
.chat-tools{display:flex;gap:.25rem;margin-bottom:.4rem}
.chat-tools button{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:.2rem;border-radius:6px}
.chat-send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#7FBA02,#5a8501);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.emoji-popover{display:none;position:absolute;bottom:100%;left:0;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:.5rem;flex-wrap:wrap;gap:.25rem;width:220px;box-shadow:var(--shadow);margin-bottom:.5rem}
.emoji-popover.show{display:flex}

/* Drop zone */
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:2rem;text-align:center;cursor:pointer;transition:border var(--transition)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 6%,transparent)}
.empty-state{text-align:center;padding:2rem;color:var(--text-muted)}

/* Mobile */
.mobile-menu-btn{display:none;background:none;border:1px solid var(--border);border-radius:8px;padding:.4rem .6rem;cursor:pointer;color:var(--text)}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .main{margin-left:0;width:100%}.mobile-menu-btn{display:inline-flex}
  .charts-grid{grid-template-columns:1fr}.chat-panel{width:100vw;height:100vh;border-radius:0;margin:0}
  .chat-dock.open{inset:0;right:0;bottom:0}.form-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}.auth-card{padding:1.25rem}
  .topbar{padding:.75rem 1rem}.content{padding:1rem}
}
/* Print */
@media print{.sidebar,.chat-dock,.topbar-actions,.toolbar,.btn{display:none!important}.main{margin-left:0;width:100%}}
/* Focus visible */
:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
/* Scrollbar */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--text-muted) 40%,transparent);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb,var(--primary) 60%,transparent)}
/* Loading overlay */
.loading-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);display:flex;align-items:center;justify-content:center;z-index:7000}
.loading-spinner{width:48px;height:48px;border:4px solid rgba(127,186,2,.25);border-top-color:#7FBA02;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Ticket detail tags */
.tag-list{display:flex;gap:.35rem;flex-wrap:wrap;margin:.5rem 0}
.tag-list span{background:color-mix(in srgb,var(--primary) 12%,transparent);color:var(--primary-dark);padding:.15rem .5rem;border-radius:12px;font-size:.72rem;font-weight:600}
/* Priority indicators */
.priority-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.35rem}
.priority-dot.critical{background:#450a0a}.priority-dot.high{background:#dc2626}
.priority-dot.medium{background:#ca8a04}.priority-dot.low{background:#059669}
/* Status timeline */
.timeline{position:relative;padding-left:1.5rem}
.timeline::before{content:'';position:absolute;left:.4rem;top:0;bottom:0;width:2px;background:var(--border)}
.timeline-item{position:relative;padding-bottom:1rem}
.timeline-item::before{content:'';position:absolute;left:-1.15rem;top:.35rem;width:10px;height:10px;border-radius:50%;background:var(--primary);border:2px solid var(--bg-card)}
/* Notification badge */
.notif-badge{background:var(--danger);color:#fff;font-size:.65rem;padding:.1rem .4rem;border-radius:10px;margin-left:.35rem}
/* Accessibility */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
/* Arturito animations extended */
@keyframes arturitoPop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes heroLogoPop{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.client-arturito-mascot .blinking-eyes{animation:arturitoBlinkSoft 5s ease-in-out infinite}
.client-arturito-mascot .waving-hand{transform-origin:50px 20px;animation:arturitoWaveSoft 4s ease-in-out infinite}
/* Chat category menu */
.category-container{margin-bottom:.65rem;padding:.55rem .65rem;background:linear-gradient(135deg,rgba(127,186,2,.08),rgba(127,186,2,.03));border-left:3px solid var(--primary);border-radius:8px;cursor:pointer}
.category-header{font-weight:600;font-size:.78rem;color:var(--arturito-green-dark)}
.topic-link{display:block;padding:.35rem .5rem;font-size:.78rem;color:var(--text);border-radius:6px;text-decoration:none}
.topic-link:hover{background:rgba(127,186,2,.12);color:var(--arturito-green-dark)}
/* Config panel tabs */
.config-tabs{display:flex;gap:.5rem;border-bottom:1px solid var(--border);margin-bottom:1rem;flex-wrap:wrap}
.config-tabs button{padding:.5rem 1rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);cursor:pointer;font-weight:600;font-size:.85rem}
.config-tabs button.active{color:var(--primary);border-bottom-color:var(--primary)}
/* File preview */
.file-preview{display:flex;align-items:center;gap:.5rem;padding:.5rem;background:color-mix(in srgb,var(--border) 25%,transparent);border-radius:8px;font-size:.82rem;margin-top:.5rem}
.file-preview img{width:48px;height:48px;object-fit:cover;border-radius:6px}
/* Progress bar */
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:.5rem 0}

<script type="text/plain" id="cloud-fn-sendTicketEmail">const { onCall, HttpsError } = require('firebase-functions/v2/https');
const admin = require('firebase-admin');
if (!admin.apps.length) admin.initializeApp();
const db = admin.firestore();
exports.sendTicketEmail = onCall({ region: 'us-central1' }, async (request) => {
  if (!request.auth) throw new HttpsError('unauthenticated', 'Autenticación requerida');
  const { condominioId, ticketId, to, subject, html, text, fromName } = request.data || {};
  if (!condominioId || !ticketId || !to || !subject) throw new HttpsError('invalid-argument', 'Faltan campos');
  const settingsSnap = await db.doc(`condominios/${condominioId}/settings/main`).get();
  const settings = settingsSnap.exists ? settingsSnap.data() : {};
  const resendKey = settings.resendApiKey || process.env.RESEND_API_KEY;
  if (!resendKey) throw new HttpsError('failed-precondition', 'API key Resend no configurada');
  const from = settings.emailFrom || 'onboarding@resend.dev';
  const res = await fetch('https://api.resend.com/emails', {
    method: 'POST',
    headers: { Authorization: `Bearer ${resendKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ from: fromName ? `${fromName} <${from}>` : from, to: Array.isArray(to) ? to : [to], subject, html: html || `<p>${(text||'').replace(/\n/g,'<br>')}</p>`, text: text || '' })
  });
  if (!res.ok) throw new HttpsError('internal', await res.text());
  const result = await res.json();
  const now = Date.now();
  await db.doc(`condominios/${condominioId}/tickets/${ticketId}`).update({ lastEmailSentAt: now, lastEmailId: result.id, updatedAt: now });
  await db.collection(`condominios/${condominioId}/logs`).add({ type: 'email_sent', ticketId, to, subject, resendId: result.id, uid: request.auth.uid, createdAt: now });
  return { ok: true, id: result.id };
});</script>

/* CONFIG */

const FIREBASE_CONFIG = {

const ROLES = Object.freeze(['SuperAdmin', 'Administrador', 'Operador', 'Residente']);

const PERMISSIONS = Object.freeze({

const VIEWS = Object.freeze([

  { id: 'settings', label: 'Configuraciones', icon: '⚙️', permission: 'settings' },
  { id: 'reports', label: 'Reportes', icon: '📈', permission: 'reports' },

]);

const TICKET_STATES = Object.freeze(['Abierto', 'Asignado', 'En Proceso', 'Pendiente', 'Resuelto', 'Cerrado']);
const TICKET_PRIORITIES = Object.freeze(['Baja', 'Media', 'Alta', 'Crítica']);
const TICKET_CATEGORIES = Object.freeze(['Mantención', 'Postventa', 'Seguridad', 'Conserjería', 'Mudanzas', 'Gastos Comunes', 'Reclamos', 'Emergencias', 'General']);

const QUICK_REPLIES = Object.freeze([
  '¿Horario de conserjería?', '¿Cómo pago gastos comunes?', '¿Cómo reservo áreas comunes?',
  'Estado de mi solicitud', 'Crear ticket', 'Hablar con un humano'
]);

const EMOJIS = Object.freeze(['😊', '👍', '🏠', '🔧', '📋', '❓', '✅', '⚠️', '📞', '🙏', '💡', '🎉']);

const STATE_BADGE = {
  'Abierto': 'badge-open', 'Asignado': 'badge-assigned', 'En Proceso': 'badge-process',
  'Pendiente': 'badge-pending', 'Resuelto': 'badge-resolved', 'Cerrado': 'badge-closed'
};
const PRIO_BADGE = { 'Baja': 'badge-low', 'Media': 'badge-medium', 'Alta': 'badge-high', 'Crítica': 'badge-critical' };

const ARTURITO_SVG_INLINE = document.querySelector('.auth-logo')?.innerHTML || '';

/* FIREBASE */
let firebaseApp, auth, db, storage, functions;
let fb = {};

async function initFirebase() {
  const [
    { initializeApp, getApps, getApp },
    { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile, sendPasswordResetEmail, setPersistence, browserLocalPersistence },
    { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, query, where, orderBy, limit, onSnapshot, serverTimestamp, writeBatch, Timestamp, runTransaction },
    { getStorage, ref, uploadBytes, getDownloadURL, deleteObject },
    { getFunctions, httpsCallable }
  ] = await Promise.all([
    import('https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js'),
    import('https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js'),
    import('https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js'),
    import('https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js'),
    import('https://www.gstatic.com/firebasejs/10.14.1/firebase-functions.js')
  ]);
  firebaseApp = getApps().length ? getApp() : initializeApp(FIREBASE_CONFIG);
  auth = getAuth(firebaseApp);
  db = getFirestore(firebaseApp);
  storage = getStorage(firebaseApp);
  functions = getFunctions(firebaseApp, 'us-central1');
  fb = { collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, query, where, orderBy, limit, onSnapshot, serverTimestamp, writeBatch, Timestamp, runTransaction, ref, uploadBytes, getDownloadURL, deleteObject, httpsCallable, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile, sendPasswordResetEmail, onAuthStateChanged };
  await setPersistence(auth, browserLocalPersistence);
  console.info('[ARTURITO] Firebase conectado:', FIREBASE_CONFIG.projectId);
  return fb;
}

function condoPath(sub) { return `condominios/${CONDOMINIO_ID}/${sub}`; }
function globalUserPath(uid) { return `users/${uid}`; }

/* AUTH */
const Auth = {
  user: null,
  profile: null,
  role: null,

  async loadProfile(uid) {
    const [globalSnap, localSnap] = await Promise.all([
      fb.getDoc(fb.doc(db, globalUserPath(uid))),
      fb.getDoc(fb.doc(db, `${condoPath('users')}/${uid}`))
    ]);
    const global = globalSnap.exists() ? globalSnap.data() : {};
    const local = localSnap.exists() ? localSnap.data() : {};
    this.profile = { uid, ...global, ...local, rol: local.rol || global.rol || 'Residente' };
    this.role = this.profile.rol;
    return this.profile;
  },

  hasPermission(perm) {
    if (!this.role) return false;
    const perms = PERMISSIONS[this.role] || [];
    return perms.includes(perm);
  },

  isStaff() { return ['SuperAdmin', 'Administrador', 'Operador'].includes(this.role); },

  async login(email, password) {
    const cred = await fb.signInWithEmailAndPassword(auth, email.trim(), password);
    this.user = cred.user;
    await this.loadProfile(cred.user.uid);
    return this.profile;
  },

  async register(name, email, password, unit) {
    const cred = await fb.createUserWithEmailAndPassword(auth, email.trim(), password);
    await fb.updateProfile(cred.user, { displayName: name.trim() });
    const now = Date.now();
    const data = { uid: cred.user.uid, nombre: name.trim(), email: email.trim().toLowerCase(), unidad: unit || '', rol: 'Residente', activo: true, createdAt: now, updatedAt: now };
    await fb.setDoc(fb.doc(db, globalUserPath(cred.user.uid)), { ...data, condominioId: CONDOMINIO_ID });
    await fb.setDoc(fb.doc(db, `${condoPath('users')}/${cred.user.uid}`), data);
    this.user = cred.user;
    this.profile = data;
    this.role = data.rol;
    return data;
  },

  async resetPassword(email) {
    if (!email?.trim()) throw new Error('Ingresa tu correo electrónico');
    await fb.sendPasswordResetEmail(auth, email.trim());
  },

  async logout() {
    await fb.signOut(auth);
    this.user = null; this.profile = null; this.role = null;
    AppState.unsubscribers.forEach(fn => { try { fn(); } catch (_) {} });
    AppState.unsubscribers = [];
  }
};

/* DATABASE */
const AppState = {
  tickets: [], users: [], knowledge: [], trainingDocs: [], messages: [], settings: {}, logs: [], notifications: [],
  unsubscribers: [], charts: {}, currentView: 'dashboard', currentConversationId: null, offline: false
};

const Database = {
  async getSettings() {
    const snap = await fb.getDoc(fb.doc(db, `${condoPath('settings')}/main`));
    if (snap.exists()) AppState.settings = snap.data();
    else AppState.settings = { branding: { name: 'ARTURITO AI', color: '#7FBA02' }, quickReplies: [...QUICK_REPLIES] };
    await IDB.put('settings', AppState.settings);
    return AppState.settings;
  },

  async saveSettings(data) {
    const payload = { ...data, updatedAt: Date.now(), updatedBy: Auth.user?.uid };
    await fb.setDoc(fb.doc(db, `${condoPath('settings')}/main`), payload, { merge: true });
    AppState.settings = { ...AppState.settings, ...payload };
    await IDB.put('settings', AppState.settings);
    await this.log('settings_updated', { keys: Object.keys(data) });
    return payload;
  },

  subscribeTickets(callback) {
    const q = fb.query(fb.collection(db, condoPath('tickets')), fb.orderBy('updatedAt', 'desc'));
    return fb.onSnapshot(q, snap => {
      AppState.tickets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      IDB.putAll('tickets', AppState.tickets);
      callback(AppState.tickets);
    }, err => { console.error('tickets sub:', err); AppState.offline = true; });
  },

  subscribeUsers(callback) {
    const q = fb.query(fb.collection(db, condoPath('users')));
    return fb.onSnapshot(q, snap => {
      AppState.users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      IDB.putAll('users', AppState.users);
      callback(AppState.users);
    });
  },

  subscribeKnowledge(callback) {
    const q = fb.query(fb.collection(db, condoPath('knowledge_base')), fb.orderBy('updatedAt', 'desc'));
    return fb.onSnapshot(q, snap => {
      AppState.knowledge = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      IDB.putAll('knowledge', AppState.knowledge);
      callback(AppState.knowledge);
    }, err => {
      console.warn('[Database] knowledge sub:', err);
      this.loadPublicData().then(() => callback(AppState.knowledge));
    });
  },

  subscribeLogs(callback) {
    const q = fb.query(fb.collection(db, condoPath('logs')), fb.orderBy('createdAt', 'desc'), fb.limit(200));
    return fb.onSnapshot(q, snap => {
      AppState.logs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      callback(AppState.logs);
    });
  },

  async getTicket(id) {
    const snap = await fb.getDoc(fb.doc(db, `${condoPath('tickets')}/${id}`));
    return snap.exists() ? { id: snap.id, ...snap.data() } : null;
  },

  async createTicket(data) {
    const now = Date.now();
    let numero;
    try {
      numero = await this.nextTicketNumber();
    } catch (e) {
      console.warn('[Database] nextTicketNumber:', e);
      numero = 'TK-' + String(Date.now()).slice(-6);
    }
    const ticket = {
      numeroTicket: numero,
      asunto: sanitize(data.asunto || 'Sin asunto'),
      descripcion: sanitize(data.descripcion || ''),
      categoria: data.categoria || 'General',
      estado: 'Abierto',
      prioridad: data.prioridad || 'Media',
      solicitanteUid: data.solicitanteUid || Auth.user?.uid || 'anon',
      solicitanteNombre: data.solicitanteNombre || Auth.profile?.nombre || 'Anónimo',
      solicitanteEmail: data.solicitanteEmail || Auth.profile?.email || '',
      unidad: data.unidad || Auth.profile?.unidad || '',
      asignadoA: null,
      asignadoNombre: null,
      origen: data.origen || 'portal',
      adjuntos: data.adjuntos || [],
      historial: [{ autor: 'sistema', nombre: 'Sistema', mensaje: 'Ticket creado', fecha: now }],
      tags: data.tags || [],
      createdAt: now,
      updatedAt: now
    };
    try {
      const ref = await fb.addDoc(fb.collection(db, condoPath('tickets')), ticket);
      await this.log('ticket_created', { ticketId: ref.id, numero }).catch(() => {});
      await IDB.put('tickets', { id: ref.id, ...ticket });
      return { id: ref.id, ...ticket };
    } catch (e) {
      console.warn('[Database] createTicket cloud failed:', e);
      const localId = 'local_' + Date.now();
      const localTicket = { id: localId, ...ticket, numeroTicket: numero, pendingSync: true };
      await IDB.put('tickets', localTicket);
      if (navigator.onLine) await OfflineSync.enqueue({ type: 'ticket_create', data }).catch(() => {});
      return localTicket;
    }
  },

  async updateTicket(id, updates) {
    const now = Date.now();
    const payload = { ...updates, updatedAt: now };
    await fb.updateDoc(fb.doc(db, `${condoPath('tickets')}/${id}`), payload);
    await this.log('ticket_updated', { ticketId: id, fields: Object.keys(updates) });
  },

  async addTicketHistory(id, entry) {
    const ticket = await this.getTicket(id);
    if (!ticket) throw new Error('Ticket no encontrado');
    const historial = [...(ticket.historial || []), { ...entry, fecha: Date.now() }];
    await this.updateTicket(id, { historial });
  },

  async nextTicketNumber() {
    const metaRef = fb.doc(db, `${condoPath('settings')}/meta`);
    let last = 0;
    await fb.runTransaction(db, async (tx) => {
      const snap = await tx.get(metaRef);
      last = snap.exists() ? (snap.data().lastTicketNumber || 0) : 0;
      last += 1;
      tx.set(metaRef, { lastTicketNumber: last, updatedAt: Date.now() }, { merge: true });
    });
    return 'TK-' + String(last).padStart(6, '0');
  },

  async saveUser(uid, data) {
    const now = Date.now();
    const payload = { ...data, uid, updatedAt: now };
    await fb.setDoc(fb.doc(db, `${condoPath('users')}/${uid}`), payload, { merge: true });
    await fb.setDoc(fb.doc(db, globalUserPath(uid)), { ...payload, condominioId: CONDOMINIO_ID }, { merge: true });
    await this.log('user_updated', { uid, rol: data.rol });
  },

  async saveKnowledgeEntry(entry) {
    const now = Date.now();
    const data = { ...entry, updatedAt: now, createdAt: entry.createdAt || now, embeddings: entry.embeddings || [] };
    if (entry.id) {
      await fb.updateDoc(fb.doc(db, `${condoPath('knowledge_base')}/${entry.id}`), data);
      return entry.id;
    }
    const ref = await fb.addDoc(fb.collection(db, condoPath('knowledge_base')), data);
    await this.log('knowledge_saved', { id: ref.id, titulo: data.titulo });
    return ref.id;
  },

  async deleteKnowledge(id) {
    await fb.deleteDoc(fb.doc(db, `${condoPath('knowledge_base')}/${id}`));
    await this.log('knowledge_deleted', { id });
  },

  async saveMessage(convId, msg) {
    const data = { ...msg, conversationId: convId, createdAt: Date.now(), uid: Auth.user?.uid || 'guest' };
    try {
      const ref = await fb.addDoc(fb.collection(db, condoPath('messages')), data);
      await IDB.put('messages', { id: ref.id, ...data });
      return ref.id;
    } catch (e) {
      console.warn('[Database] saveMessage offline:', e);
      const localId = 'local_' + Date.now();
      await IDB.put('messages', { id: localId, ...data });
      if (navigator.onLine) await OfflineSync.enqueue({ type: 'message', conversationId: convId, data: msg }).catch(() => {});
      return localId;
    }
  },

  async getConversationMessages(convId) {
    try {
      const q = fb.query(fb.collection(db, condoPath('messages')), fb.where('conversationId', '==', convId), fb.orderBy('createdAt', 'asc'));
      const snap = await fb.getDocs(q);
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch (e) {
      console.warn('[Database] getConversationMessages:', e);
      const local = (await IDB.getAll('messages')).filter(m => m.conversationId === convId);
      return local.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
    }
  },

  async log(type, meta = {}) {
    try {
      await fb.addDoc(fb.collection(db, condoPath('logs')), { type, ...meta, uid: Auth.user?.uid || null, createdAt: Date.now() });
    } catch (e) { console.warn('log error', e); }
  },

  async loadOfflineCache() {
    AppState.tickets = await IDB.getAll('tickets') || [];
    const cachedSettings = await IDB.get('settings');
    if (cachedSettings) {
      const { id: _id, ...settingsData } = cachedSettings;
      AppState.settings = { ...AppState.settings, ...settingsData };
    }
    AppState.knowledge = await IDB.getAll('knowledge') || [];
    AppState.messages = await IDB.getAll('messages') || [];
  },

  async loadPublicData() {
    try {
      await this.getSettings();
      ColorUtils?.loadFromSettings?.();
      Chatbot.renderQuickReplies?.();
    } catch (e) { console.warn('[Database] settings:', e); }
    try {
      const snap = await fb.getDocs(fb.collection(db, condoPath('knowledge_base')));
      AppState.knowledge = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      await IDB.putAll('knowledge', AppState.knowledge);
    } catch (e) {
      console.warn('[Database] knowledge:', e);
      AppState.knowledge = await IDB.getAll('knowledge') || [];
    }
  }
};

/* IndexedDB offline sync */
const IDB = {
  db: null,
  async open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(IDB_NAME, IDB_VERSION);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        ['tickets', 'messages', 'settings', 'knowledge', 'pending_sync', 'users'].forEach(s => {
          if (!d.objectStoreNames.contains(s)) d.createObjectStore(s, { keyPath: 'id' });
        });
      };
      req.onsuccess = e => { this.db = e.target.result; resolve(this.db); };
      req.onerror = () => reject(req.error);
    });
  },
  async put(store, item) {
    if (!this.db) return;
    return new Promise((res, rej) => {
      const tx = this.db.transaction(store, 'readwrite');
      tx.objectStore(store).put({ ...item, id: item.id || item.key || 'main' });
      tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error);
    });
  },
  async putAll(store, items) {
    if (!this.db || !items?.length) return;
    const tx = this.db.transaction(store, 'readwrite');
    const os = tx.objectStore(store);
    items.forEach(i => os.put({ ...i, id: i.id }));
    return new Promise((res, rej) => { tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); });
  },
  async get(store, id = 'main') {
    if (!this.db) return null;
    return new Promise((res, rej) => {
      const req = this.db.transaction(store, 'readonly').objectStore(store).get(id);
      req.onsuccess = () => res(req.result || null);
      req.onerror = () => rej(req.error);
    });
  },
  async getAll(store) {
    if (!this.db) return [];
    return new Promise((res, rej) => {
      const req = this.db.transaction(store, 'readonly').objectStore(store).getAll();
      req.onsuccess = () => res(req.result || []);
      req.onerror = () => rej(req.error);
    });
  }
};

/* UTILITIES */
const Utils = {
  lastAction: 0,
  rateLimit() {
    const now = Date.now();
    if (now - this.lastAction < RATE_LIMIT_MS) return false;
    this.lastAction = now;
    return true;
  },
  escapeHtml(str) {
    if (str == null) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  },
  sanitize(str) { return String(str || '').trim().slice(0, MAX_MSG_LEN); },
  formatDate(ts) {
    if (!ts) return '—';
    const d = typeof ts === 'object' && ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleString('es-CL', { dateStyle: 'short', timeStyle: 'short' });
  },
  toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 4000);
  },
  $(sel) { return document.querySelector(sel); },
  $$(sel) { return [...document.querySelectorAll(sel)]; },
  show(el) { el?.classList.remove('hidden'); },
  hide(el) { el?.classList.add('hidden'); },
  badge(text, cls) { return `<span class="badge ${cls}">${Utils.escapeHtml(text)}</span>`; },
  stateBadge(s) { return Utils.badge(s, STATE_BADGE[s] || 'badge-secondary'); },
  prioBadge(p) { return Utils.badge(p, PRIO_BADGE[p] || 'badge-medium'); },
  csvEscape(v) {
    const s = String(v ?? '');
    if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  },
  downloadCsv(filename, rows) {
    const blob = new Blob(['\ufeff' + rows.join('\n')], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  },
  debounce(fn, ms = 300) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
  },
  genId() { return 'conv_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
};
const escapeHtml = Utils.escapeHtml.bind(Utils);
const sanitize = Utils.sanitize.bind(Utils);

function openModal(title, body, footer = '') {
  const overlay = Utils.$('#modal-overlay');
  Utils.$('#modal-content').innerHTML = `
    <div class="modal-header"><h3>${escapeHtml(title)}</h3><button type="button" class="modal-close" id="modal-close-btn">×</button></div>
    <div class="modal-body">${body}</div>${footer ? `<div class="modal-footer" style="margin-top:1rem;display:flex;gap:.5rem;justify-content:flex-end">${footer}</div>` : ''}`;
  overlay.classList.add('show');
  Utils.$('#modal-close-btn').onclick = closeModal;
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };
}
function closeModal() {
  const overlay = Utils.$('#modal-overlay');
  overlay.classList.remove('show');
  overlay.onclick = null;
}

/* CHATBOT */
const Chatbot = {
  open: false,
  typing: false,
  conversationId: null,
  _bound: false,

  init() {
    this.conversationId = localStorage.getItem('arturito_conv') || Utils.genId();
    localStorage.setItem('arturito_conv', this.conversationId);
    if (!this._bound) {
      this.bindEvents();
      this._bound = true;
    }
    this.renderQuickReplies();
    this.renderEmojis();
    this.loadHistory();
  },

  bindEvents() {
    Utils.$('#chat-fab').onclick = () => this.toggle(true);
    Utils.$('#chat-close').onclick = () => this.toggle(false);
    Utils.$('#chat-send').onclick = () => this.send();
    Utils.$('#chat-input').onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.send(); } };
    Utils.$('#btn-emoji').onclick = () => Utils.$('#emoji-popover').classList.toggle('show');
    Utils.$('#btn-attach').onclick = () => Utils.$('#chat-file-input').click();
    Utils.$('#chat-file-input').onchange = e => this.handleAttachment(e.target.files[0]);
    Utils.$('#btn-open-chat')?.addEventListener('click', () => this.toggle(true));
  },

  toggle(open) {
    this.open = open ?? !this.open;
    Utils.$('#chat-dock').classList.toggle('open', this.open);
    if (this.open) Utils.$('#chat-input').focus();
  },

  renderQuickReplies() {
    const replies = AppState.settings?.quickReplies || QUICK_REPLIES;
    Utils.$('#chat-quick-bar').innerHTML = replies.map(r =>
      `<button type="button" data-q="${escapeHtml(r)}">${escapeHtml(r)}</button>`
    ).join('');
    Utils.$$('#chat-quick-bar button').forEach(btn => {
      btn.onclick = () => { Utils.$('#chat-input').value = btn.dataset.q; this.send(); };
    });
  },

  renderEmojis() {
    Utils.$('#emoji-popover').innerHTML = EMOJIS.map(e => `<button type="button">${e}</button>`).join('');
    Utils.$$('#emoji-popover button').forEach(btn => {
      btn.onclick = () => {
        Utils.$('#chat-input').value += btn.textContent;
        Utils.$('#emoji-popover').classList.remove('show');
        Utils.$('#chat-input').focus();
      };
    });
  },

  async loadHistory() {
    try {
      const msgs = await Database.getConversationMessages(this.conversationId);
      const container = Utils.$('#chat-messages');
      container.innerHTML = '';
      if (!msgs.length) {
        this.addBotMessage('¡Hola! Soy **Arturito**, tu asistente del condominio. ¿En qué puedo ayudarte hoy?');
        return;
      }
      msgs.forEach(m => this.renderMessage(m.role, m.text, m.createdAt, false));
      container.scrollTop = container.scrollHeight;
    } catch (e) {
      const cached = (await IDB.getAll('messages')).filter(m => m.conversationId === this.conversationId);
      cached.forEach(m => this.renderMessage(m.role, m.text, m.createdAt, false));
    }
  },

  renderMessage(role, text, ts, animate = true) {
    const container = Utils.$('#chat-messages');
    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
    if (!animate) div.style.animation = 'none';
    const formatted = escapeHtml(text).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    div.innerHTML = `<div>${formatted}</div><div class="msg-time">${Utils.formatDate(ts || Date.now())}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  },

  showTyping(show) {
    Utils.$('#typing-indicator').classList.toggle('show', show);
    this.typing = show;
  },

  async send() {
    if (!Utils.rateLimit()) return;
    const input = Utils.$('#chat-input');
    const text = sanitize(input.value);
    if (!text) return;
    input.value = '';
    this.renderMessage('user', text);
    try { await Database.saveMessage(this.conversationId, { role: 'user', text }); } catch (_) {}
    this.showTyping(true);
    let reply;
    try { reply = await this.processMessage(text); } catch (e) {
      console.warn('[Chatbot] processMessage:', e);
      reply = { text: 'Ocurrió un error al procesar tu mensaje. Intenta de nuevo.' };
    }
    this.showTyping(false);
    this.renderMessage('bot', reply.text);
    try { await Database.saveMessage(this.conversationId, { role: 'bot', text: reply.text, meta: reply.meta }); } catch (_) {}
    if (reply.actions?.length) this.renderActions(reply.actions);
  },

  renderActions(actions) {
    const container = Utils.$('#chat-messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="msg-actions">${actions.map(a => `<button type="button" data-action="${escapeHtml(a.id)}">${escapeHtml(a.label)}</button>`).join('')}</div>`;
    container.appendChild(div);
    div.querySelectorAll('button').forEach(btn => {
      btn.onclick = () => this.handleAction(btn.dataset.action);
    });
  },

  async handleAction(action) {
    if (action === 'create_ticket') {
      Utils.$('#chat-input').value = 'Quiero crear un ticket';
      await this.send();
    } else if (action === 'escalate') {
      await Database.log('chat_escalated', { conversationId: this.conversationId });
      this.addBotMessage('He notificado al equipo de administración. Te contactarán pronto.');
    }
  },

  addBotMessage(text) {
    this.renderMessage('bot', text);
    Database.saveMessage(this.conversationId, { role: 'bot', text });
  },

  searchKnowledge(query) {
    const q = query.toLowerCase();
    const results = AppState.knowledge.filter(k => {
      const hay = `${k.titulo || ''} ${k.contenido || ''} ${(k.tags || []).join(' ')}`.toLowerCase();
      return hay.includes(q) || q.split(/\s+/).some(w => w.length > 3 && hay.includes(w));
    });
    return results.slice(0, 5);
  },

  async processMessage(text) {
    const lower = text.toLowerCase();
    if (/crear ticket|nueva solicitud|reportar|abrir ticket/.test(lower)) {
      return { text: 'Perfecto, voy a crear tu solicitud. ¿Cuál es el asunto o problema?', meta: { flow: 'ticket' }, actions: [] };
    }
    if (/hablar con humano|escalar|persona real|administrador/.test(lower)) {
      return {
        text: 'Entiendo que prefieres hablar con el equipo humano. He enviado una notificación a administración.',
        actions: [{ id: 'escalate', label: 'Confirmar escalamiento' }, { id: 'create_ticket', label: 'Crear ticket' }]
      };
    }
    if (/estado.*(ticket|solicitud)|mis solicitudes/.test(lower)) {
      const uid = Auth.user?.uid;
      const mine = AppState.tickets.filter(t => t.solicitanteUid === uid);
      if (!mine.length) return { text: 'No encontré solicitudes activas a tu nombre. ¿Deseas crear una nueva?' };
      const list = mine.slice(0, 5).map(t => `• ${t.numeroTicket}: ${t.asunto} — ${t.estado}`).join('\n');
      return { text: `Tus solicitudes recientes:\n${list}` };
    }
    const kb = this.searchKnowledge(text);
    if (kb.length) {
      const best = kb[0];
      return { text: `**${best.titulo}**\n\n${best.contenido}`, meta: { knowledgeId: best.id } };
    }
    const faq = (AppState.settings?.faq || []).find(f => lower.includes((f.pregunta || '').toLowerCase().slice(0, 20)));
    if (faq) return { text: faq.respuesta };
    if (AppState.settings?.openaiApiKey || AppState.settings?.geminiApiKey) {
      const ai = await this.callAI(text);
      if (ai) return { text: ai };
    }
    return {
      text: 'No encontré información específica sobre eso en mi base de conocimiento. ¿Quieres que cree un ticket para que el equipo te ayude?',
      actions: [{ id: 'create_ticket', label: 'Crear ticket' }, { id: 'escalate', label: 'Escalar a humano' }]
    };
  },

  async callAI(text) {
    try {
      if (AppState.settings?.openaiApiKey) {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: { Authorization: `Bearer ${AppState.settings.openaiApiKey}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: AppState.settings.openaiModel || 'gpt-4o-mini',
            messages: [
              { role: 'system', content: `Eres Arturito, asistente del condominio ${AppState.settings?.branding?.name || 'ARTURITO'}. Responde en español, breve y útil.` },
              { role: 'user', content: text }
            ],
            max_tokens: 500
          })
        });
        if (res.ok) { const j = await res.json(); return j.choices?.[0]?.message?.content; }
      }
      if (AppState.settings?.geminiApiKey) {
        const model = AppState.settings.geminiModel || 'gemini-1.5-flash';
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${AppState.settings.geminiApiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: `Eres Arturito, asistente del condominio. Responde en español: ${text}` }] }] })
        });
        if (res.ok) { const j = await res.json(); return j.candidates?.[0]?.content?.parts?.[0]?.text; }
      }
    } catch (e) { console.warn('AI error', e); }
    return null;
  },

  async handleAttachment(file) {
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { Utils.toast('Archivo muy grande (máx 10MB)', 'error'); return; }
    try {
      const meta = await StorageService.uploadFile(`${condoPath('messages')}/${this.conversationId}/${Date.now()}_${file.name}`, file);
      this.renderMessage('user', `[Adjunto: ${file.name}]`);
      await Database.saveMessage(this.conversationId, { role: 'user', text: `[Adjunto: ${file.name}]`, attachment: meta });
      this.addBotMessage('Recibí tu archivo. ¿Deseas crear un ticket con este adjunto?');
    } catch (e) { Utils.toast('Error al subir archivo', 'error'); }
  }
};

    this.refreshRows();
  },

  filtered() {
    return AppState.tickets.filter(t => {
      if (this.filter.estado && t.estado !== this.filter.estado) return false;
      if (this.filter.categoria && t.categoria !== this.filter.categoria) return false;
      if (this.filter.search) {
        const hay = `${t.numeroTicket} ${t.asunto} ${t.solicitanteNombre} ${t.unidad}`.toLowerCase();
        if (!hay.includes(this.filter.search.toLowerCase())) return false;
      }
      return true;
    });
  },

  renderRows() {
    const list = this.filtered();
    if (!list.length) return '<tr><td colspan="8" class="empty-state">No hay tickets</td></tr>';
    return list.map(t => `<tr>
      <td>${escapeHtml(t.numeroTicket)}</td>
      <td>${escapeHtml(t.asunto)}</td>
      <td>${Utils.stateBadge(t.estado)}</td>
      <td>${Utils.prioBadge(t.prioridad)}</td>
      <td>${escapeHtml(t.categoria)}</td>
      <td>${escapeHtml(t.solicitanteNombre)}<br><small>${escapeHtml(t.unidad)}</small></td>
      <td>${Utils.formatDate(t.updatedAt)}</td>
      <td><button class="btn btn-secondary btn-sm" data-id="${t.id}">Ver</button></td>
    </tr>`).join('');
  },

  refreshRows() {
    const tbody = Utils.$('#tickets-tbody');

const Training = {
  render() {
    const el = Utils.$('#view-training');
    el.innerHTML = `
      <div class="card">

        <div class="drop-zone" id="training-drop">

          <input type="file" id="training-file" hidden multiple accept=".pdf,.docx,.doc,.txt,.csv,.xlsx,.xls">
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Entradas de conocimiento (${AppState.knowledge.length})</span>
          <button class="btn btn-primary btn-sm" id="btn-add-knowledge">+ Manual</button></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Título</th><th>Categoría</th><th>Fuente</th><th>Embeddings</th><th>Actualizado</th><th></th></tr></thead>
          <tbody id="knowledge-tbody">${this.renderRows()}</tbody>
        </table></div>
      </div>`;
    const drop = Utils.$('#training-drop');
    drop.onclick = () => Utils.$('#training-file').click();
    drop.ondragover = e => { e.preventDefault(); drop.classList.add('dragover'); };
    drop.ondragleave = () => drop.classList.remove('dragover');
    drop.ondrop = e => { e.preventDefault(); drop.classList.remove('dragover'); this.handleFiles(e.dataTransfer.files); };
    Utils.$('#training-file').onchange = e => this.handleFiles(e.target.files);
    Utils.$('#btn-add-knowledge').onclick = () => this.showManualForm();
  },

  renderRows() {
    if (!AppState.knowledge.length) return '<tr><td colspan="6" class="empty-state">Sin entradas — sube documentos para comenzar</td></tr>';
    return AppState.knowledge.map(k => `<tr>
      <td>${escapeHtml(k.titulo)}</td><td>${escapeHtml(k.categoria || 'General')}</td>
      <td>${escapeHtml(k.fuente || 'manual')}</td>
      <td>${(k.embeddings?.length || 0) > 0 ? '✓ Listo' : '— Pendiente'}</td>
      <td>${Utils.formatDate(k.updatedAt)}</td>
      <td><button class="btn btn-danger btn-sm" data-del="${k.id}">Eliminar</button></td>
    </tr>`).join('');
  },

  refreshRows() {
    const tb = Utils.$('#knowledge-tbody');
    if (tb) {
      tb.innerHTML = this.renderRows();
      tb.querySelectorAll('[data-del]').forEach(btn => btn.onclick = async () => {
        if (confirm('¿Eliminar esta entrada?')) { await Database.deleteKnowledge(btn.dataset.del); Utils.toast('Eliminado', 'success'); }
      });
    }
  },

  async handleFiles(fileList) {
    for (const file of fileList) {
      try {
        Utils.toast(`Procesando ${file.name}…`, 'info');
        await StorageService.uploadTrainingDoc(file);
        const text = await this.extractText(file);
        if (!text?.trim()) { Utils.toast(`No se extrajo texto de ${file.name}`, 'error'); continue; }
        const chunks = this.chunkText(text);
        for (let i = 0; i < chunks.length; i++) {
          await Database.saveKnowledgeEntry({
            titulo: `${file.name.replace(/\.[^.]+$/, '')} — Parte ${i + 1}`,
            contenido: chunks[i],
            categoria: 'Documento',
            fuente: file.name,
            tags: [file.name.split('.').pop()],
            embeddings: []
          });
        }
        Utils.toast(`${file.name} procesado (${chunks.length} entradas)`, 'success');
      } catch (e) { Utils.toast(`Error: ${file.name} — ${e.message}`, 'error'); }
    }
    this.refreshRows();
  },

  async extractText(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext === 'txt' || ext === 'csv') return await file.text();
    if (ext === 'pdf') {
      const pdfjs = window.pdfjsLib;
      if (!pdfjs?.getDocument) throw new Error('PDF.js no cargó. Recarga la página e intenta de nuevo.');
      if (pdfjs.GlobalWorkerOptions) pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const buf = await file.arrayBuffer();
      const pdf = await pdfjs.getDocument({ data: buf }).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(it => it.str).join(' ') + '\n';
      }
      return text;
    }
    if (ext === 'docx' || ext === 'doc') {
      const result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
      return result.value;
    }
    if (ext === 'xlsx' || ext === 'xls') {
      const wb = XLSX.read(await file.arrayBuffer(), { type: 'array' });
      return wb.SheetNames.map(n => XLSX.utils.sheet_to_csv(wb.Sheets[n])).join('\n');
    }
    throw new Error('Formato no soportado');
  },

  chunkText(text, size = 1500) {
    const chunks = [];
    for (let i = 0; i < text.length; i += size) chunks.push(text.slice(i, i + size).trim());
    return chunks.filter(c => c.length > 50);
  },

  showManualForm() {
    openModal('Nueva entrada manual', `
      <form id="kb-form" class="form-grid">
        <div class="form-group"><label>Título</label><input name="titulo" required></div>
        <div class="form-group"><label>Categoría</label><input name="categoria" value="General"></div>
        <div class="form-group full"><label>Contenido</label><textarea name="contenido" required rows="6"></textarea></div>
        <div class="form-group full"><label>Tags (separados por coma)</label><input name="tags"></div>
      </form>`,
      `<button class="btn btn-secondary" onclick="UI.closeModal()">Cancelar</button><button class="btn btn-primary" id="kb-save">Guardar</button>`
    );
    Utils.$('#kb-save').onclick = async () => {
      const fd = new FormData(Utils.$('#kb-form'));
      const tags = (fd.get('tags') || '').split(',').map(t => t.trim()).filter(Boolean);
      await Database.saveKnowledgeEntry({ titulo: fd.get('titulo'), contenido: fd.get('contenido'), categoria: fd.get('categoria'), tags, fuente: 'manual', embeddings: [] });
      closeModal();
      this.refreshRows();
      Utils.toast('Entrada guardada', 'success');
    };
  }
};

/* SECURITY — validación, sanitización y control de acceso */
const Security = {
  allowedMime: ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'application/pdf', 'text/plain', 'text/csv', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'],
  maxFileSize: 10 * 1024 * 1024,

  validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || '').trim());
  },

  validateRole(rol) {
    return ROLES.includes(rol);
  },

  validateFile(file) {
    if (!file) return { ok: false, error: 'Archivo vacío' };
    if (file.size > this.maxFileSize) return { ok: false, error: 'Archivo excede 10MB' };
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    const allowedExt = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'pdf', 'txt', 'csv', 'docx', 'doc', 'xlsx', 'xls'];
    if (!allowedExt.includes(ext)) return { ok: false, error: 'Tipo de archivo no permitido' };
    return { ok: true };
  },

  stripScripts(html) {
    return String(html || '').replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
  },

  canAccessView(viewId) {
    const view = VIEWS.find(v => v.id === viewId);
    if (!view) return false;
    return Auth.hasPermission(view.permission);
  },

  requireStaff() {
    if (!Auth.isStaff()) throw new Error('Acceso denegado: se requiere rol de staff');
  },

  requireRole(...roles) {
    if (!roles.includes(Auth.role)) throw new Error('Permiso insuficiente');
  },

  hashSimple(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = ((h << 5) - h) + str.charCodeAt(i) | 0;
    return h.toString(36);
  }
};

/* OFFLINE SYNC — cola de operaciones pendientes IndexedDB */
const OfflineSync = {
  queue: [],

  async init() {
    this.queue = await IDB.getAll('pending_sync') || [];
    window.addEventListener('online', () => this.flush());
  },

  async enqueue(op) {
    const item = { id: 'sync_' + Date.now(), ...op, createdAt: Date.now() };
    await IDB.put('pending_sync', item);
    this.queue.push(item);
    if (navigator.onLine) await this.flush();
  },

  async flush() {
    if (!navigator.onLine || !this.queue.length) return;
    const pending = [...this.queue];
    for (const op of pending) {
      try {
        if (op.type === 'ticket_create') await Database.createTicket(op.data);
        else if (op.type === 'message') await Database.saveMessage(op.conversationId, op.data);
        else if (op.type === 'settings') await Database.saveSettings(op.data);
        this.queue = this.queue.filter(q => q.id !== op.id);
        try { await IDB.put('pending_sync', { ...op, synced: true }); } catch (_) {}
      } catch (e) { console.warn('Sync pending failed:', op.type, e); break; }
    }
    const synced = pending.length - this.queue.length;
    if (synced > 0) Utils.toast(`Sincronizados ${synced} cambios`, 'success');
  },

  async syncFromFirestore() {
    try {
      await Database.getSettings();
      const [tSnap, kSnap] = await Promise.all([
        fb.getDocs(fb.query(fb.collection(db, condoPath('tickets')), fb.orderBy('updatedAt', 'desc'))),
        fb.getDocs(fb.collection(db, condoPath('knowledge_base')))
      ]);
      AppState.tickets = tSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      AppState.knowledge = kSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      await IDB.putAll('tickets', AppState.tickets);
      await IDB.putAll('knowledge', AppState.knowledge);
    } catch (e) { console.warn('Full sync failed', e); }
  }
};

/* EMBEDDINGS — preparación de vectores para OpenAI/Gemini */
const Embeddings = {
  async prepareForEntry(entryId) {
    const entry = AppState.knowledge.find(k => k.id === entryId);
    if (!entry) return null;
    const text = `${entry.titulo}\n${entry.contenido}`.slice(0, 8000);
    let vector = [];
    if (AppState.settings?.openaiApiKey) {
      vector = await this.openaiEmbed(text);
    } else if (AppState.settings?.geminiApiKey) {
      vector = await this.geminiEmbed(text);
    }
    if (vector.length) {
      await Database.saveKnowledgeEntry({ id: entryId, embeddings: vector, embeddingModel: AppState.settings?.openaiApiKey ? 'openai' : 'gemini', embeddedAt: Date.now() });
    }
    return vector;
  },

  async openaiEmbed(text) {
    const res = await fetch('https://api.openai.com/v1/embeddings', {
      method: 'POST',
      headers: { Authorization: `Bearer ${AppState.settings.openaiApiKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'text-embedding-3-small', input: text })
    });
    if (!res.ok) return [];
    const j = await res.json();
    return j.data?.[0]?.embedding || [];
  },

  async geminiEmbed(text) {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/text-embedding-004:embedContent?key=${AppState.settings.geminiApiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'models/text-embedding-004', content: { parts: [{ text }] } })
    });
    if (!res.ok) return [];
    const j = await res.json();
    return j.embedding?.values || [];
  },

  cosineSimilarity(a, b) {
    if (!a?.length || !b?.length || a.length !== b.length) return 0;
    let dot = 0, na = 0, nb = 0;
    for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; }
    return dot / (Math.sqrt(na) * Math.sqrt(nb) || 1);
  },

  async semanticSearch(query, limit = 5) {
    const qLower = query.toLowerCase();
    const withEmb = AppState.knowledge.filter(k => k.embeddings?.length);
    if (!withEmb.length) return Chatbot.searchKnowledge(query);
    let qVec = [];
    if (AppState.settings?.openaiApiKey) qVec = await this.openaiEmbed(query);
    if (!qVec.length) return Chatbot.searchKnowledge(query);
    return withEmb
      .map(k => ({ ...k, score: this.cosineSimilarity(qVec, k.embeddings) }))
      .sort((a, b) => b.score - a.score)
      .slice(0, limit);
  }
};

/* CHATBOT — flujo extendido de creación de tickets */
Chatbot.ticketFlow = null;

Chatbot.startTicketFlow = function () {
  this.ticketFlow = { step: 0, data: { origen: 'chatbot' } };
};

Chatbot.processTicketFlow = async function (text) {
  const flow = this.ticketFlow;
  if (!flow) return null;
  if (flow.step === 0) {
    flow.data.asunto = sanitize(text);
    flow.step = 1;
    return { text: 'Gracias. Ahora describe el **problema o solicitud** con detalle:' };
  }
  if (flow.step === 1) {
    flow.data.descripcion = sanitize(text);
    flow.step = 2;
    const cats = TICKET_CATEGORIES.map((c, i) => `${i + 1}. ${c}`).join('\n');
    return { text: `Selecciona una **categoría** (escribe el número):\n${cats}` };
  }
  if (flow.step === 2) {
    const num = parseInt(text, 10);
    flow.data.categoria = TICKET_CATEGORIES[num - 1] || 'General';
    flow.step = 3;
    return { text: '¿Qué **prioridad** le das? (1=Baja, 2=Media, 3=Alta, 4=Crítica)' };
  }
  if (flow.step === 3) {
    const num = parseInt(text, 10);
    flow.data.prioridad = TICKET_PRIORITIES[num - 1] || 'Media';
    flow.data.solicitanteUid = Auth.user?.uid || 'guest';
    flow.data.solicitanteNombre = Auth.profile?.nombre || 'Residente';
    flow.data.solicitanteEmail = Auth.profile?.email || '';
    flow.data.unidad = Auth.profile?.unidad || '';
    try {
      const ticket = navigator.onLine
        ? await Database.createTicket(flow.data)
        : await OfflineSync.enqueue({ type: 'ticket_create', data: flow.data }).then(() => ({ numeroTicket: 'Pendiente sync' }));
      this.ticketFlow = null;
      try {
        await Notifications.push({ titulo: 'Nuevo ticket', mensaje: flow.data.asunto, tipo: 'ticket', ticketId: ticket.id || ticket.numeroTicket });
      } catch (_) {}
      return { text: `✅ Solicitud creada: **${ticket.numeroTicket}**\n\nEl equipo la revisará pronto. ¿Necesitas algo más?` };
    } catch (e) {
      this.ticketFlow = null;
      return { text: 'Hubo un error al crear la solicitud. Intenta de nuevo o escala a un humano.' };
    }
  }
  return null;
};

const _processMessageOrig = Chatbot.processMessage.bind(Chatbot);
Chatbot.processMessage = async function (text) {
  if (this.ticketFlow) {
    const r = await this.processTicketFlow(text);
    if (r) return r;
  }
  const lower = text.toLowerCase();
  if (/crear ticket|nueva solicitud|reportar|abrir ticket/.test(lower)) {
    this.startTicketFlow();
    return { text: 'Perfecto, voy a crear tu solicitud. ¿Cuál es el **asunto** de tu consulta?' };
  }
  const semantic = await Embeddings.semanticSearch(text, 3);
  if (semantic.length && semantic[0].score > 0.75) {
    const best = semantic[0];
    return { text: `**${best.titulo}**\n\n${best.contenido}`, meta: { knowledgeId: best.id, score: best.score } };
  }
  return _processMessageOrig(text);
};

/* TRAINING — generación batch de embeddings */
Training.generateEmbeddings = async function () {
  const pending = AppState.knowledge.filter(k => !k.embeddings?.length);
  if (!pending.length) { Utils.toast('Todas las entradas ya tienen embeddings', 'info'); return; }
  if (!AppState.settings?.openaiApiKey && !AppState.settings?.geminiApiKey) {
    Utils.toast('Configura API key de OpenAI o Gemini en Configuraciones', 'error');
    return;
  }
  Utils.toast(`Generando embeddings para ${pending.length} entradas…`, 'info');
  let done = 0;
  for (const entry of pending) {
    try { await Embeddings.prepareForEntry(entry.id); done++; } catch (e) { console.warn(e); }
  }
  this.refreshRows();
  Utils.toast(`${done} embeddings generados`, 'success');
};

/* TicketAnalytics — métricas avanzadas para reportes */
const TicketAnalytics = {
  avgResolutionTime() {
    const resolved = AppState.tickets.filter(t => t.estado === 'Resuelto' || t.estado === 'Cerrado');
    if (!resolved.length) return 0;
    const total = resolved.reduce((sum, t) => sum + ((t.updatedAt || 0) - (t.createdAt || 0)), 0);
    return Math.round(total / resolved.length / 3600000);
  },

  byAssignee() {
    const map = {};
    AppState.tickets.forEach(t => {
      const name = t.asignadoNombre || 'Sin asignar';
      map[name] = (map[name] || 0) + 1;
    });
    return map;
  },

  byCategory() {
    const map = {};
    AppState.tickets.forEach(t => { map[t.categoria] = (map[t.categoria] || 0) + 1; });
    return map;
  },

  slaBreaches(hours = 48) {
    const limit = hours * 3600000;
    const now = Date.now();
    return AppState.tickets.filter(t => {
      if (['Resuelto', 'Cerrado'].includes(t.estado)) return false;
      return (now - (t.createdAt || now)) > limit;
    });
  },

  renderSummary() {
    const sla = this.slaBreaches();
    return '<div class="stats-grid">' +
      '<div class="stat-card amber"><div class="stat-value">' + this.avgResolutionTime() + 'h</div><div class="stat-label">Tiempo medio resolución</div></div>' +
      '<div class="stat-card red"><div class="stat-value">' + sla.length + '</div><div class="stat-label">SLA incumplido (>48h)</div></div>' +
      '</div>';
  }
};

const ChatAnalytics = {
  countByDay(days) {
    const map = {};
    const now = Date.now();
    AppState.messages.forEach(m => {
      const age = now - (m.createdAt || 0);
      if (age > days * 86400000) return;
      const d = new Date(m.createdAt).toLocaleDateString('es-CL');
      map[d] = (map[d] || 0) + 1;
    });
    return map;
  },
  userVsBot() {
    let user = 0, bot = 0;
    AppState.messages.forEach(m => { if (m.role === 'user') user++; else if (m.role === 'bot') bot++; });
    return { user, bot, total: user + bot };
  },
  topTopics() {
    const counts = {};
    AppState.messages.filter(m => m.role === 'user').forEach(m => {
      const w = (m.text || '').toLowerCase().slice(0, 40);
      if (w.length > 5) counts[w] = (counts[w] || 0) + 1;
    });
    return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10);
  }
};

  },

    TICKET_STATES.forEach(s => byState[s] = 0);
    t.forEach(tk => { if (byState[tk.estado] !== undefined) byState[tk.estado]++; });
    return 'Resumen de tickets\n' + 'Total: ' + t.length + '\n' +
      Object.entries(byState).map(([k, v]) => k + ': ' + v).join('\n');
  }
};

/* SchemaValidator */
const SchemaValidator = {
  validateTicket(data) {
    const errors = [];
    if (!data.asunto || !String(data.asunto).trim()) errors.push('Asunto requerido');
    if (data.estado && !TICKET_STATES.includes(data.estado)) errors.push('Estado inválido');
    if (data.prioridad && !TICKET_PRIORITIES.includes(data.prioridad)) errors.push('Prioridad inválida');
    if (data.categoria && !TICKET_CATEGORIES.includes(data.categoria)) errors.push('Categoría inválida');
    return errors;
  },
  validateUser(data) {
    const errors = [];
    if (!data.nombre) errors.push('Nombre requerido');
    if (!data.email || !Security.validateEmail(data.email)) errors.push('Email inválido');
    if (data.rol && !Security.validateRole(data.rol)) errors.push('Rol inválido');
    return errors;
  }
};

/* Wrap Database.createTicket with validation */
const _createTicketOrig = Database.createTicket.bind(Database);
Database.createTicket = async function (data) {
  const errors = SchemaValidator.validateTicket(data);
  if (errors.length) throw new Error(errors.join(', '));
  return _createTicketOrig(data);
};

/* ColorUtils — aplicar branding dinámico */
const ColorUtils = {
  applyBrand(color) {
    if (!color) return;
    document.documentElement.style.setProperty('--primary', color);
    document.documentElement.style.setProperty('--arturito-green', color);
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', color);
  },
  loadFromSettings() {
    const c = AppState.settings && AppState.settings.branding && AppState.settings.branding.color;
    if (c) this.applyBrand(c);
  }
};

/* Apply brand after settings load */
const _getSettingsOrig = Database.getSettings.bind(Database);
Database.getSettings = async function () {
  const s = await _getSettingsOrig();
  ColorUtils.loadFromSettings();
  return s;
};

/* PWA — Service Worker embebido */
function registerArturitoServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') return;
  const scope = location.pathname.replace(/[^/]*$/, '') || '/';
  const swCode = [
    "const CACHE='arturito-ai-v2';",
    "self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll([self.registration.scope,new URL('index.html',self.registration.scope).href])).catch(()=>{}));self.skipWaiting();});",
    "self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==CACHE).map(x=>caches.delete(x)))));self.clients.claim();});",
    "self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(c=>c||fetch(e.request).catch(()=>caches.match(new URL('index.html',self.registration.scope).href))));});"
  ].join('');
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob), { scope }).catch(() => {});
}
registerArturitoServiceWorker();
